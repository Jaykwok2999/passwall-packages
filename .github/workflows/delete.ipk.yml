jobs:
  Update:
    runs-on: ubuntu-latest
    steps:
    - name: Clone Repository
      uses: actions/checkout@v4

    - name: Set git
      run : |
        git config --global user.email "194788255+Jaykwok2999@users.noreply.github.com"
        git config --global user.name "Jaykwok2999"
        sudo timedatectl set-timezone "Asia/Shanghai"

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      continue-on-error: true
      with:
        retain_days: 1
        keep_minimum_runs: 0  
        
    - name: delete
      run: |

        rm -rf ./luci-app-momo
        
        
         
        #git clone --depth=1 https://github.com/immortalwrt/luci.git -b openwrt-24.10
        #mv ./luci/applications/luci-app-vlmcsd ./luci-app-vlmcsd
        #rm -rf ./luci
        
        
        
        
    - name: Apply
      run: |
        Emoji=("рЯОЙ" "рЯ§Ю" "вЬ®" "рЯОБ" "рЯОИ" "рЯОД" "рЯО®" "рЯТЛ" "рЯНУ" "рЯНХ" "рЯНЙ" "рЯТР" "рЯМі" "рЯЪА" "рЯЫЄ" "рЯЧљ" "вЫЕ" "рЯМИ" "рЯФ•" "вЫД" "рЯРґ" "рЯПЕ" "рЯ¶Д" "рЯР§")
        git add .
        git commit -m "${Emoji[$[$RANDOM % ${#Emoji[@]}]]} Sync $(date +%Y-%m-%d" "%H:%M:%S)"
        for pkg in $(git diff-tree --no-commit-id --name-only HEAD); do
          if [ "$(grep "PKG_RELEASE" $pkg/Makefile)" ]; then
            sed -i "s/PKG_RELEASE:=.*/PKG_RELEASE:=$(git rev-list --count main $pkg)/" $pkg/Makefile || true
          fi
        done
        git reset --soft HEAD^
        git add .
        git commit -m "${Emoji[$[$RANDOM % ${#Emoji[@]}]]} Sync $(date +%Y-%m-%d" "%H:%M:%S)"
        git push -f
